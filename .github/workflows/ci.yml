# ── CI: 코드 검증 파이프라인 ─────────────────────────────
# develop 브랜치로의 PR 시 코드 품질 검사 + 테스트 실행

name: CI - Lint & Test

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  lint:
    name: 🔍 Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Ruff Formatter Check
        run: ruff format --check .

  test:
    name: 🧪 Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: modoo
          POSTGRES_PASSWORD: modoo1234
          POSTGRES_DB: modoo_marble_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U modoo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-mock httpx

      - name: Run tests
        env:
          DATABASE_URL: postgres://modoo:modoo1234@localhost:5432/modoo_marble_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
          APP_ENV: test
        run: pytest -v --tb=short

  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t modoo-marble-backend:test .

      - name: Verify image
        run: docker images modoo-marble-backend:test
