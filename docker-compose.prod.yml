# ── 프로덕션 오버라이드 ───────────────────────────────────
# 사용법: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    # 프로덕션에서는 소스 마운트 제거, 핫리로드 비활성화
    volumes: []
    command: gunicorn app.main:application -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    environment:
      DATABASE_URL: postgres://modoo:${DB_PASSWORD}@db:5432/modoo_marble
      REDIS_URL: redis://redis:6379
      APP_ENV: production
      DEBUG: "false"
    restart: always
