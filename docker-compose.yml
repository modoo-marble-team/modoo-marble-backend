# ── 모두의 마블 Docker Compose ────────────────────────────
# FastAPI + PostgreSQL + Redis

services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16
    container_name: modoo-db
    environment:
      POSTGRES_USER: modoo
      POSTGRES_PASSWORD: modoo1234
      POSTGRES_DB: modoo_marble
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modoo -d modoo_marble"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: modoo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modoo-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://modoo:modoo1234@db:5432/modoo_marble
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 개발 모드: 핫리로드 + 소스 마운트
    volumes:
      - .:/app
    command: uvicorn app.main:application --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
